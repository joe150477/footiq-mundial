<style>
:root {
  --bg:#06080d; --bg2:#0b0e17; --card:#111827; --border:#1c2538;
  --text:#e2e8f4; --muted:#4a5a72; --accent:#2fa8f5; --gold:#f0bc35;

  --dim:#6b7a90;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui;font-size:20px;display:flex;flex-direction:column;min-height:100vh;overflow-y:auto;}
#overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}

@keyframes spin{to{transform:rotate(360deg)}}

<script>
// ==================== REGISTRO DE TORNEOS ====================
// Fechas verificadas 21-jul-2026 (Dimayor, LaLiga, CONMEBOL, FIFA)
const TORNEOS = {
  betplay: {
    nombre:'Liga BetPlay 2026-II', corto:'🇨🇴 BetPlay', espn:'col.1',
    inicio:'2026-07-24', fin:'2026-12-15', estado:'activo', seedDesde:'2026-01-15', seedHasta:'2026-07-23',
    nota:'20 equipos · 19 fechas todos contra todos (hasta 8 nov) + cuadrangulares. Inicia vie 24 jul. Campeón Apertura 2026-I: Atlético Junior (3-1 global a Nacional).',
    baseDraw:0.28, baseFav:0.46
  },
  laliga: {
    nombre:'LaLiga 2026-27', corto:'🇪🇸 LaLiga', espn:'esp.1',
    inicio:'2026-08-15', fin:'2027-05-30', estado:'activo', seedDesde:'2025-08-10', seedHasta:'2026-06-01',
    nota:'Jornada 1: sáb 15 ago (Alavés–Getafe 19:00). Partidos de equipos con mundialistas pueden aplazarse al 25-27 ago.',
    baseDraw:0.25, baseFav:0.49
  },
  wc2026: {
    nombre:'Mundial 2026', corto:'🏆 WC26', espn:'fifa.world',
    inicio:'2026-06-11', fin:'2026-07-19', estado:'finalizado',
    campeon:{equipo:'España', flag:'🇪🇸', detalle:'1-0 a Argentina en la prórroga (Ferran Torres, min 106)'},
    podio:[['🇪🇸 España','Campeón'],['🇦🇷 Argentina','Subcampeón'],['🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inglaterra','3er lugar (6-4 a Francia)']]
  },
  eliminatorias: {
    nombre:'Eliminatorias CONMEBOL 2030', corto:'🌎 Elim. 2030', espn:'fifa.worldq.conmebol',
    inicio:'2027-03-22', estado:'futuro',
    nota:'Previstas para iniciar en la fecha FIFA del 22-30 de marzo de 2027 (pendiente confirmación FIFA). Argentina, Uruguay y Paraguay ya clasificados como anfitriones del centenario.'
  },
  copaamerica: {
    nombre:'Copa América 2028', corto:'🏆 CA 2028', espn:'conmebol.america',
    inicio:'2028-06-20', estado:'futuro',
    nota:'Prevista jun-jul 2028. Sede sin confirmar oficialmente — Ecuador es el principal candidato.'
  },
  wc2030: {
    nombre:'Mundial 2030', corto:'🌍 WC 2030', espn:'fifa.world',
    inicio:'2030-06-01', estado:'futuro',
    nota:'Sedes: España, Portugal y Marruecos + 3 partidos del centenario en Argentina, Uruguay y Paraguay.'
  }
};
let ACTIVE = localStorage.getItem('fiq2_active') || 'betplay';
if(!TORNEOS[ACTIVE]) ACTIVE='betplay';

const _now = new Date();
const todayStr = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;

// ==================== ESTADO POR TORNEO ====================
// S[t] = { teams:{id:{name,logo}}, matches:[{id,date,h,a,sh,sa,played,odds:{pH,pD,pA,first:{...}}}] }
let S = {};
function loadState(t){
  if(S[t]) return S[t];
  try{
    const raw=localStorage.getItem('fiq2_'+t);
    if(raw){ S[t]=JSON.parse(raw); return S[t]; }
  }catch(e){}
  S[t]={teams:{},matches:[]};
  return S[t];
}
function saveState(t){ try{ localStorage.setItem('fiq2_'+t, JSON.stringify(S[t])); }catch(e){} }

// ==================== MOTORES (4) ====================
// Todos se evalúan WALK-FORWARD: cada partido se predice solo con datos
// anteriores a ese partido. Nada de autoevaluación con datos del futuro.

// --- Motor 1: ELO ---
function eloProb(rH,rA,baseDraw){
  const diff=rH-rA;
  const pW=1/(1+Math.pow(10,-diff/400));
  const draw=Math.max(0.12,Math.min(0.32,(baseDraw??0.26)-Math.abs(diff)*0.00015));
  const pH=pW*(1-draw), pA=(1-pW)*(1-draw);
  return {pH,pD:1-pH-pA,pA};
}
function eloUpdate(elo,h,a,sh,sa){
  const K=30;
  const eh=elo[h]??1500, ea=elo[a]??1500;
  const expH=1/(1+Math.pow(10,(ea-eh)/400));
  const actH=sh>sa?1:sh===sa?0.5:0;
  const gd=Math.abs(sh-sa);
  const kAdj=gd<=1?1:gd===2?1.5:gd===3?1.75:1.75+0.5*Math.log(gd-2);
  const Ke=Math.round(K*kAdj);
  elo[h]=Math.round(eh+Ke*(actH-expH));
  elo[a]=Math.round(ea+Ke*((1-actH)-(1-expH)));
}

// --- Motor 2: Momentum (últimos 5, solo partidos previos) ---
function momProb(fH,fA){
  // fX = {pts,n} de los últimos 5 partidos previos
  if(fH.n<2||fA.n<2) return null; // sin datos suficientes: se abstiene
  const rH=(fH.pts/fH.n)/3, rA=(fA.pts/fA.n)/3;
  const tot=rH+rA;
  const pW=tot>0?rH/tot:0.5;
  const draw=Math.max(0.14,Math.min(0.30,0.30-Math.abs(rH-rA)*0.20));
  const pH=pW*(1-draw), pA=(1-pW)*(1-draw);
  return {pH,pD:1-pH-pA,pA};
}

// --- Motor 3: Mercado (cuotas reales de casas, vía ESPN) ---
// Capa 2 del diseño: probabilidad implícita de las cuotas + movimiento.
// Si no hay cuotas para el partido, el motor SE ABSTIENE (no inventa).
function mercadoProb(m){
  const o=m.odds;
  if(!o||o.pH==null) return null;
  let {pH,pD,pA}=o;
  // Señal de movimiento: si la cuota del favorito BAJÓ desde primera captura,
  // el dinero lo respalda → pequeño refuerzo (máx ±4%).
  if(o.first&&o.first.pH!=null){
    const dH=pH-o.first.pH, dA=pA-o.first.pA;
    pH=Math.max(0.02,Math.min(0.92,pH+dH*0.5));
    pA=Math.max(0.02,Math.min(0.92,pA+dA*0.5));
    pD=Math.max(0.05,1-pH-pA);
  }
  const s=pH+pD+pA;
  return {pH:pH/s,pD:pD/s,pA:pA/s};
}

// --- Motor 3: 🌀 ANOMALÍA — el clon de la casa (EXPERIMENTO DE SOBREAJUSTE) ---
// Fusiona el mercado de apuestas y el análisis de anomalías en UN motor:
// Paso 1 (hecho): entrenado sobre los 104 partidos del Mundial 2026 hasta el
// 100% de acierto (capa SGD 76.9% + memoria residual de 24 partidos).
// 74 parámetros para 104 partidos = sobreajuste deliberado.
// Paso 2 (en curso): se aplica a partidos FUTUROS (BetPlay/LaLiga) para medir
// si "el clon de la casa" transfiere o colapsa. Su precisión real se acumula
// walk-forward en la pestaña Motores. Hipótesis nula: colapsa a ~ELO o peor.
const ANOM_MODEL={"meta": {"scale": 1, "cut": 1.2716, "entrenado": "WC2026", "partidos": 104, "accCapa1": 76.9, "accFinal": 100}, "ratings": {"Mexico": 2.186, "South Africa": -4.061, "South Korea": -4.956, "Czechia": -5.965, "Canada": -0.709, "Bosnia": -0.838, "United States": 1.06, "Paraguay": 0.184, "Qatar": -2.342, "Switzerland": 2.207, "Brazil": 1.058, "Morocco": 1.253, "Haiti": -7.511, "Scotland": -3.208, "Australia": 0.69, "Turkey": -0.347, "Germany": -0.473, "Curaçao": -3.076, "Ivory Coast": -0.75, "Ecuador": -1.505, "Netherlands": 0.578, "Japan": -1.069, "Sweden": -1.793, "Tunisia": -6.716, "Spain": 8.967, "Cape Verde": 5.895, "Belgium": 2.643, "Egypt": 1.891, "Saudi Arabia": 5.332, "Uruguay": 5.332, "Iran": 1.447, "New Zealand": -0.203, "France": 4.39, "Senegal": -2.373, "Iraq": -6.955, "Norway": 2.653, "Argentina": 7.909, "Algeria": -1.725, "Austria": -1.646, "Jordan": -6.664, "Portugal": 3.804, "DR Congo": 2.145, "England": 5.489, "Croatia": 2.36, "Ghana": 1.424, "Panama": -5.249, "Uzbekistan": -4.736, "Colombia": 3.975}, "memoria": {"South Korea|Czechia": "H", "United States|Paraguay": "H", "Qatar|Switzerland": "D", "Australia|Turkey": "H", "Ivory Coast|Ecuador": "H", "Netherlands|Japan": "D", "Spain|Cape Verde": "D", "Iran|New Zealand": "D", "Portugal|DR Congo": "D", "Czechia|South Africa": "D", "United States|Australia": "H", "Turkey|Paraguay": "A", "Germany|Ivory Coast": "H", "Ecuador|Curaçao": "D", "Belgium|Iran": "D", "England|Ghana": "D", "South Africa|South Korea": "H", "Ecuador|Germany": "H", "Turkey|United States": "H", "Croatia|Ghana": "H", "Australia|Egypt": "D", "Switzerland|Colombia": "D", "France|England": "A", "Spain|Argentina": "H"}};
function _casaSig(x){return 1/(1+Math.exp(-x));}
// Modo A (equipos del Mundial): modelo completo con memoria — 100% en entrenamiento
function _anomWC(h,a){
  const R=ANOM_MODEL.ratings;
  if(R[h]==null||R[a]==null) return null;
  const memo=ANOM_MODEL.memoria[h+'|'+a];
  if(memo) return memo==='H'?{pH:0.90,pD:0.06,pA:0.04}:memo==='A'?{pH:0.04,pD:0.06,pA:0.90}:{pH:0.05,pD:0.90,pA:0.05};
  const z=(R[h]-R[a])*ANOM_MODEL.meta.scale, cut=ANOM_MODEL.meta.cut;
  let pH=_casaSig(z-cut), pA=_casaSig(-z-cut), pD=Math.max(0.02,1-pH-pA);
  const s=pH+pD+pA; return {pH:pH/s,pD:pD/s,pA:pA/s};
}
// Modo B (transferencia a ligas nuevas): solo la parte meta aprendida del WC
// (escala + banda de empate) aplicada al ELO walk-forward de la liga. norm=40 fijo.
function _anomMeta(rH,rA){
  const z=(rH-rA)/40*ANOM_MODEL.meta.scale, cut=ANOM_MODEL.meta.cut;
  let pH=_casaSig(z-cut), pA=_casaSig(-z-cut), pD=Math.max(0.02,1-pH-pA);
  const s=pH+pD+pA; return {pH:pH/s,pD:pD/s,pA:pA/s};
}

// Motor unificado: (a) equipos del Mundial → modelo completo con memoria (100% entrenamiento);
// (b) ligas nuevas CON cuotas → la cuota real de la casa manda (70%) + reglas WC (30%);
// (c) ligas nuevas SIN cuotas → solo las reglas aprendidas del WC sobre el ELO de la liga.
function anomaliaProb(m,rH,rA){
  const full=_anomWC(m.h,m.a);
  if(full) return full;
  const meta=_anomMeta(rH,rA);
  const mk=mercadoProb(m);
  if(mk){
    let pH=mk.pH*0.7+meta.pH*0.3, pD=mk.pD*0.7+meta.pD*0.3, pA=mk.pA*0.7+meta.pA*0.3;
    const t=pH+pD+pA; return {pH:pH/t,pD:pD/t,pA:pA/t};
  }
  return meta;
}

// Anomalías DOCUMENTADAS del Mundial 2026 (motivación del experimento — verificadas en prensa/FIFA)
const ANOMALIAS_WC=[
  'Final: Argentina terminó los 90&#39; SIN UN SOLO REMATE — primera vez en la historia de las finales de un Mundial. Intentos 15-0 para España; xG argentino 0.2 en 120&#39;.',
  '3er puesto: Francia encajó 6 goles ante Inglaterra (4-6) un torneo después de llegar como semifinalista dominante.',
  'Paraguay eliminó a Alemania por penales en R32; Marruecos eliminó a Holanda por penales.',
  'España campeona habiendo empatado 0-0 con Cabo Verde en fase de grupos.',
  'Cabo Verde llevó a Argentina a la prórroga en R32 (3-2) — casi la mayor sorpresa de la historia.'
];

const MOTORES=['elo','mom','anomalia'];
const MOTOR_LBL={elo:'⚡ ELO',mom:'🔥 Momentum',anomalia:'🌀 Anomalía (entrenada WC)'};

// ==================== PASADA WALK-FORWARD ====================
// Una sola pasada cronológica por torneo:
//  - antes de cada partido jugado: registra la predicción de cada motor (estado previo)
//  - después: actualiza ELO, forma, anomalía
// Devuelve: estado final (para predecir futuros), aciertos por motor, pesos honestos.
function argMax3(p){ return (p.pH>=p.pA&&p.pH>=p.pD)?'H':(p.pA>=p.pH&&p.pA>=p.pD)?'A':'D'; }

function walkForward(t){
  const st=loadState(t);
  const cfg=TORNEOS[t];
  const elo={}; const form={}; // form[team]=[resultados recientes: 3/1/0]
  const anom={favW:0,favN:0,draws:0,n:0};
  const hits={},tot={},log=[];
  MOTORES.forEach(m=>{hits[m]=0;tot[m]=0;});
  const played=st.matches.filter(m=>m.played).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let scored=0;
  for(const m of played){
    if(m.seed){
      // Historia previa (Apertura / temporada pasada): solo calibra ELO y forma
      eloUpdate(elo,m.h,m.a,m.sh,m.sa);
      (form[m.h]=form[m.h]||[]).push(m.sh>m.sa?3:m.sh===m.sa?1:0);
      (form[m.a]=form[m.a]||[]).push(m.sa>m.sh?3:m.sh===m.sa?1:0);
      continue;
    }
    scored++;
    const rH=elo[m.h]??1500, rA=elo[m.a]??1500;
    const f5=team=>{const arr=(form[team]||[]).slice(-5);return {pts:arr.reduce((s,x)=>s+x,0),n:arr.length};};
    const preds={
      elo: eloProb(rH,rA,cfg.baseDraw),
      mom: momProb(f5(m.h),f5(m.a)),
      anomalia: anomaliaProb(m,rH,rA)
    };
    const actual=m.sh>m.sa?'H':m.sh<m.sa?'A':'D';
    const row={id:m.id,h:m.h,a:m.a,sh:m.sh,sa:m.sa,date:m.date,res:{}};
    for(const k of MOTORES){
      if(!preds[k]) { row.res[k]=null; continue; }
      tot[k]++;
      const ok=argMax3(preds[k])===actual;
      if(ok) hits[k]++;
      row.res[k]=ok;
    }
    log.push(row);
    // actualizar estado con el resultado
    const favIsH=rH>=rA;
    if(m.sh!==m.sa){ anom.favN++; if((m.sh>m.sa)===favIsH) anom.favW++; }
    else anom.draws++;
    anom.n++;
    eloUpdate(elo,m.h,m.a,m.sh,m.sa);
    (form[m.h]=form[m.h]||[]).push(m.sh>m.sa?3:m.sh===m.sa?1:0);
    (form[m.a]=form[m.a]||[]).push(m.sa>m.sh?3:m.sh===m.sa?1:0);
  }
  // pesos honestos: habilidad sobre base 40% con piso; motores sin datos → 0
  const base=0.40, floor=0.02; const raw={}; let sum=0;
  for(const k of MOTORES){
    const n=tot[k];
    raw[k]=n>=8?Math.max(floor,(hits[k]/n)-base):0;
    sum+=raw[k];
  }
  const w={};
  for(const k of MOTORES) w[k]=sum>0?raw[k]/sum:(k==='elo'?1:0); // arranque: solo ELO
  return {elo,form,anom,hits,tot,weights:w,log,playedCount:scored,seedCount:played.length-scored};
}

let WF={}; // cache por torneo
function getWF(t){ if(!WF[t]) WF[t]=walkForward(t); return WF[t]; }
function invalidateWF(t){ delete WF[t]; }

// ==================== PREDICCIÓN DE PARTIDOS FUTUROS ====================
function predictMatch(t,m){
  const wf=getWF(t);
  const cfg=TORNEOS[t];
  const rH=wf.elo[m.h]??1500, rA=wf.elo[m.a]??1500;
  const f5=team=>{const arr=(wf.form[team]||[]).slice(-5);return {pts:arr.reduce((s,x)=>s+x,0),n:arr.length};};
  const preds={
    elo: eloProb(rH,rA,cfg.baseDraw),
    mom: momProb(f5(m.h),f5(m.a)),
    anomalia: anomaliaProb(m,rH,rA)
  };
  // consenso: pesos walk-forward, renormalizados entre motores CON datos
  let pH=0,pD=0,pA=0,ws=0;
  for(const k of MOTORES){
    if(!preds[k]) continue;
    const w=wf.weights[k]||0;
    pH+=preds[k].pH*w; pD+=preds[k].pD*w; pA+=preds[k].pA*w; ws+=w;
  }
  if(ws<=0){ const e=preds.elo; pH=e.pH;pD=e.pD;pA=e.pA; ws=1; }
  pH/=ws;pD/=ws;pA/=ws;
  const s=pH+pD+pA;
  return {pH:pH/s,pD:pD/s,pA:pA/s,preds,calibrando:wf.playedCount<10};
}
// ==================== SYNC ESPN ====================
async function fetchJSON(url,timeoutMs=9000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){ clearTimeout(tid); throw e; }
}
async function fetchWithProxies(url){
  const enc=encodeURIComponent(url);
  const tries=[
    ()=>fetchJSON(url,6000),
    ()=>fetchJSON('https://api.allorigins.win/raw?url='+enc,12000),
    async()=>{const w=await fetchJSON('https://api.allorigins.win/get?url='+enc,12000);return JSON.parse(w.contents);},
    ()=>fetchJSON('https://api.codetabs.com/v1/proxy/?quest='+enc,12000),
  ];
  let lastErr;
  for(const f of tries){ try{ return await f(); }catch(e){ lastErr=e; } }
  throw lastErr||new Error('sin conexión');
}
function _fmtD(d){ return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }

// Cuotas americanas/decimales → prob implícita normalizada
function oddsToProbs(oddsObj){
  try{
    // ESPN soccer: odds[0] con moneylineHome/Draw/Away (americanas) o
    // homeTeamOdds.moneyLine / drawOdds.moneyLine / awayTeamOdds.moneyLine
    const o=oddsObj;
    const am=v=>{ v=parseFloat(v); if(isNaN(v))return null; return v>0?100/(v+100):(-v)/(-v+100); };
    let h=am(o.moneylineHome ?? o.homeTeamOdds?.moneyLine);
    let d=am(o.moneylineDraw ?? o.drawOdds?.moneyLine);
    let a=am(o.moneylineAway ?? o.awayTeamOdds?.moneyLine);
    if(h==null||d==null||a==null) return null;
    const s=h+d+a; // quita el margen de la casa
    return {pH:h/s,pD:d/s,pA:a/s};
  }catch(e){ return null; }
}

function parseEvents(t,events,isSeed){
  const st=loadState(t);
  const byId={}; st.matches.forEach(m=>byId[m.id]=m);
  let nuevos=0,actualizados=0;
  for(const ev of (events||[])){
    const comp=ev.competitions?.[0]; if(!comp) continue;
    const home=comp.competitors?.find(c=>c.homeAway==='home');
    const away=comp.competitors?.find(c=>c.homeAway==='away');
    if(!home||!away) continue;
    const hName=home.team?.displayName||home.team?.shortDisplayName;
    const aName=away.team?.displayName||away.team?.shortDisplayName;
    if(!hName||!aName) continue;
    st.teams[hName]={name:hName};
    st.teams[aName]={name:aName};
    const id=ev.id||hName+'|'+aName+'|'+(ev.date||'');
    const status=comp.status?.type?.name||'';
    const done=comp.status?.type?.completed===true||['STATUS_FINAL','STATUS_FULL_TIME','STATUS_FINAL_PEN','STATUS_FINAL_AET'].includes(status);
    let m=byId[id];
    if(!m){ m={id,h:hName,a:aName,sh:null,sa:null,played:false,odds:null}; if(isSeed)m.seed=true; st.matches.push(m); byId[id]=m; nuevos++; }
    m.date=(ev.date||'').slice(0,16); // ISO con hora
    if(done){
      const sh=parseInt(home.score??'-1'), sa=parseInt(away.score??'-1');
      if(!isNaN(sh)&&sh>=0&&!isNaN(sa)){ if(!m.played)actualizados++; m.sh=sh; m.sa=sa; m.played=true; }
    }
    // Capturar cuotas (capa Mercado): primera vista + última vista
    const rawOdds=comp.odds?.[0];
    if(rawOdds&&!done){
      const p=oddsToProbs(rawOdds);
      if(p){
        if(!m.odds) m.odds={...p,first:{...p}};
        else { if(!m.odds.first) m.odds.first={pH:m.odds.pH,pD:m.odds.pD,pA:m.odds.pA}; Object.assign(m.odds,p); }
      }
    }
  }
  saveState(t);
  return {nuevos,actualizados};
}

async function syncTorneo(t){
  const cfg=TORNEOS[t];
  if(!cfg||cfg.estado==='futuro'||cfg.estado==='finalizado') return {nuevos:0,actualizados:0};
  const base=`https://site.api.espn.com/apis/site/v2/sports/soccer/${cfg.espn}/scoreboard`;
  const st0=loadState(t);
  // Siembra (una sola vez): historia previa para calibrar el ELO antes de la jornada 1
  if(cfg.seedDesde && !st0.seedDone){
    try{
      const s0=new Date(cfg.seedDesde+'T00:00:00'), s1=new Date(cfg.seedHasta+'T00:00:00');
      const sd=await fetchWithProxies(`${base}?dates=${_fmtD(s0)}-${_fmtD(s1)}&limit=500`);
      parseEvents(t,sd.events||[],true);
      st0.seedDone=true; saveState(t);
    }catch(e){ console.warn('seed:',e.message); }
  }
  // Temporada completa: calendario entero para poder simular el título
  const d0=new Date(cfg.inicio+'T00:00:00');
  const d1=cfg.fin?new Date(cfg.fin+'T00:00:00'):(()=>{const x=new Date();x.setDate(x.getDate()+30);return x;})();
  const rng=`${_fmtD(d0)}-${_fmtD(d1)}`;
  const data=await fetchWithProxies(`${base}?dates=${rng}&limit=500`);
  const res=parseEvents(t,data.events||[]);
  invalidateWF(t);
  return res;
}

// ==================== TABLA DE POSICIONES ====================
function computeStandings(t){
  const st=loadState(t);
  const tbl={};
  for(const m of st.matches){
    if(!m.played||m.seed) continue;
    tbl[m.h]=tbl[m.h]||{pts:0,pj:0,gf:0,gc:0};
    tbl[m.a]=tbl[m.a]||{pts:0,pj:0,gf:0,gc:0};
    tbl[m.h].pj++; tbl[m.a].pj++;
    tbl[m.h].gf+=m.sh; tbl[m.h].gc+=m.sa;
    tbl[m.a].gf+=m.sa; tbl[m.a].gc+=m.sh;
    if(m.sh>m.sa) tbl[m.h].pts+=3;
    else if(m.sh<m.sa) tbl[m.a].pts+=3;
    else { tbl[m.h].pts++; tbl[m.a].pts++; }
  }
  return Object.entries(tbl).map(([team,s])=>({team,...s,dg:s.gf-s.gc}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

// ==================== MONTE CARLO TÍTULO (fase regular) ====================
function simTitle(t,N=300){
  const st=loadState(t);
  const pend=st.matches.filter(m=>!m.played&&!m.seed);
  const stand=computeStandings(t);
  if(!stand.length||!pend.length) return null;
  const basePts={}; stand.forEach(s=>basePts[s.team]=s.pts);
  Object.keys(loadState(t).teams).forEach(tm=>{ if(basePts[tm]==null) basePts[tm]=0; });
  const preds=pend.map(m=>({m,p:predictMatch(t,m)}));
  const wins={};
  for(let i=0;i<N;i++){
    const pts={...basePts};
    for(const {m,p} of preds){
      const r=Math.random();
      if(r<p.pH) pts[m.h]=(pts[m.h]||0)+3;
      else if(r<p.pH+p.pD){ pts[m.h]=(pts[m.h]||0)+1; pts[m.a]=(pts[m.a]||0)+1; }
      else pts[m.a]=(pts[m.a]||0)+3;
    }
    let best=null,bp=-1;
    for(const [tm,v] of Object.entries(pts)) if(v>bp){bp=v;best=tm;}
    wins[best]=(wins[best]||0)+1;
  }
  return Object.entries(wins).map(([team,w])=>({team,p:+(w/N*100).toFixed(1)}))
    .sort((a,b)=>b.p-a.p);
}

  const cfg=TORNEOS[ACTIVE];
  if(cfg.estado!=='activo'){
    pg.innerHTML=`<div class="card future-card"><div class="future-note">La comparativa de motores aplica a torneos en juego. ${cfg.estado==='finalizado'?'Este torneo ya terminó.':'Este torneo no ha empezado.'}</div></div>`;
    return;
  }
  const wf=getWF(ACTIVE);
  if(!wf.playedCount){
    const seedNote=wf.seedCount?`<br><br>✅ ELO ya calibrado con <b>${wf.seedCount}</b> partidos de historia previa (Apertura / temporada pasada) — por eso las predicciones ya distinguen a los equipos.`:'';
    pg.innerHTML='<div class="card future-card"><div class="future-icon">📊</div><div class="future-note">Aún no hay partidos jugados en este torneo. La precisión de cada motor aparecerá aquí, medida SOLO con predicciones hechas antes de cada partido (walk-forward, sin trampa estadística).'+seedNote+'</div></div>';
    return;
  }
  let h='<div class="card" style="background:rgba(47,168,245,.07);border-color:rgba(47,168,245,.25);font-size:15px;line-height:1.5">'+
    '🔬 <b>Evaluación honesta (walk-forward):</b> cada motor se califica solo con lo que sabía ANTES de cada partido. Nada de autoevaluarse con datos del futuro (el bug que inflaba el 85% en la versión anterior).</div>';
  const ranked=MOTORES.map(k=>({k,acc:wf.tot[k]?wf.hits[k]/wf.tot[k]:null})).sort((a,b)=>(b.acc??-1)-(a.acc??-1));
  h+='<div class="stitle">🏅 Precisión real · '+wf.playedCount+' partidos</div>';
  ranked.forEach((r,i)=>{
    const medal=['🥇','🥈','🥉','4️⃣'][i];
    const accS=r.acc==null?'—':(r.acc*100).toFixed(1)+'%';
    const w=Math.round((wf.weights[r.k]||0)*100);
    h+='<div class="card" style="padding:10px 14px">'+
      `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:18px;font-weight:800">${medal} ${MOTOR_LBL[r.k]}</span><span style="font-size:17px;font-weight:800;color:var(--gold)">${accS}</span></div>`+
      `<div style="font-size:14px;color:var(--muted);margin-top:3px">✅ ${wf.hits[r.k]}/${wf.tot[r.k]} aciertos · peso en el consenso: ${w}%</div>`+
      '</div>';
  });
  // Tarjeta del experimento de sobreajuste
  const anAcc=wf.tot.anomalia?(wf.hits.anomalia/wf.tot.anomalia*100).toFixed(1):null;
  h+=`<div class="card" style="border-color:rgba(240,188,53,.4);font-size:15px;line-height:1.6"><b>🌀 Experimento en curso — ¿transfiere el clon de la casa?</b><br>`+
    `<b>Paso 1 (hecho):</b> Anomalía entrenada con el Mundial 2026 — <b>${ANOM_MODEL.meta.accFinal}%</b> (${ANOM_MODEL.meta.partidos}/${ANOM_MODEL.meta.partidos}) en entrenamiento, 74 parámetros. Usa cuotas reales de la casa cuando existen.<br>`+
    `<b>Paso 2 (este torneo):</b> ${anAcc!==null?`va en <b>${anAcc}%</b> (${wf.hits.anomalia}/${wf.tot.anomalia}) fuera de muestra`:'esperando partidos'}. `+
    `Si se queda cerca del ELO o por debajo, el 100% del entrenamiento era memoria, no conocimiento.</div>`;
  if(wf.anom.n>=8){
    const favRate=wf.anom.favN?Math.round(wf.anom.favW/wf.anom.favN*100):0;
    const drawRate=Math.round(wf.anom.draws/wf.anom.n*100);
    h+=`<div class="card" style="font-size:15px;line-height:1.6"><b>🌀 Contexto del torneo</b><br>`+
      `Favoritos (ELO) ganando: <b>${favRate}%</b> de los partidos con ganador (base histórica ~${Math.round((cfg.baseFav||0.47)*100)}%)<br>`+
      `Empates: <b>${drawRate}%</b> (base ~${Math.round((cfg.baseDraw||0.26)*100)}%)</div>`;
  }
  // log partido a partido (últimos 20)
  const last=wf.log.slice(-20).reverse();
  if(last.length){
    h+='<div class="stitle">📋 Últimos partidos</div><div class="card" style="padding:8px 12px;overflow-x:auto"><table class="motor-table"><thead><tr><th style="text-align:left">Partido</th>'+MOTORES.map(k=>'<th>'+MOTOR_LBL[k].split(' ')[0]+'</th>').join('')+'</tr></thead><tbody>';
    for(const r of last){
      h+='<tr><td>'+r.h+' '+r.sh+'-'+r.sa+' '+r.a+'</td>'+MOTORES.map(k=>'<td>'+(r.res[k]==null?'–':r.res[k]?'✅':'❌')+'</td>').join('')+'</tr>';
    }
    h+='</tbody></table></div>';
  }
  pg.innerHTML=h;
}

// ==================== RELOJ Y BOOT ====================
function updateColTime(){
  const now=new Date();
  const utcMs=now.getTime()+now.getTimezoneOffset()*60000;
  const col=new Date(utcMs-5*3600000);
  const el=document.getElementById('colTime');
  if(el) el.textContent=`🕐 ${String(col.getHours()).padStart(2,'0')}:${String(col.getMinutes()).padStart(2,'0')} COL`;
}
setInterval(updateColTime,1000);
function setProgress(p,msg){
  document.getElementById('progFill').style.width=Math.min(100,p)+'%';
  document.getElementById('stepMsg').innerText=msg;
}
async function boot(){
  try{
    updateColTime();
    setProgress(15,'Cargando torneos…');
    renderTorneoBar();
    setProgress(40,'Restaurando datos guardados…');
    loadState(ACTIVE);
    setProgress(70,'Calibrando motores (walk-forward)…');
    getWF('betplay'); getWF('laliga');
    setProgress(100,'¡Listo!');
    document.getElementById('statusDot').className='sdot ok';
    document.getElementById('overlay').classList.add('gone');
    refreshAll();
    setTimeout(()=>syncActive(),800);
  }catch(e){
    document.getElementById('stepMsg').innerText='❌ Error: '+e.message;
    document.getElementById('overlay').classList.add('gone');
    console.error('boot:',e);
    try{ renderTorneoBar(); refreshAll(); }catch(ex){}
  }
}
boot();
</script>
