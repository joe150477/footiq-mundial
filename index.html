<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FootIQ · Mundial 2026 · BetPlay</title>
<style>
:root {
  --bg:#06080d; --bg2:#0b0e17; --card:#111827; --border:#1c2538;
  --text:#e2e8f4; --muted:#4a5a72; --accent:#2fa8f5; --gold:#f0bc35;
  --green:#20c05a; --red:#e8404a; --orange:#f97316; --yellow:#facc15;
  --dim:#6b7a90;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* === OVERLAY === */
#overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#overlay.gone{display:none;}
.ov-ball{font-size:44px;animation:spin 2s linear infinite;}
.ov-title{font-size:18px;font-weight:700;}
.ov-sub{font-size:11px;color:var(--muted);}
.ov-prog{width:280px;height:4px;background:var(--border);border-radius:2px;}
.ov-fill{height:100%;background:var(--accent);width:0%;transition:width .2s;}
.ov-step{font-size:12px;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{50%{opacity:.3}}

/* === TOPBAR / TABS === */
.topbar{display:flex;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;gap:8px;}
.logo{font-size:20px;font-weight:900;} .logo em{color:var(--accent);}
.spacer{flex:1;}
.score-pill{background:var(--bg2);border-radius:99px;padding:3px 8px;font-size:12px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.sdot.ok{background:var(--green);}
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);}
.tab{flex:1;text-align:center;padding:8px 2px;font-size:9px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab .ti{font-size:15px;display:block;}

/* === PAGES === */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;padding:12px;display:none;}
.page.active{display:block;}

/* === CARDS / ROWS === */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
.stitle{font-size:12px;font-weight:700;margin:10px 0 6px;display:flex;align-items:center;gap:5px;}
.trow{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);}
.tflg{font-size:18px;} .tname{font-size:12px;font-weight:600;flex:1;}
.tpct{font-size:11px;font-weight:700;color:var(--accent);}
.pill{font-size:9px;padding:1px 6px;border-radius:99px;}
.pg{background:rgba(32,192,90,.2);color:var(--green);}

/* === CHAMPION === */
.champ-wrap{background:linear-gradient(135deg,#090f1e,#0d1c35);border-radius:16px;padding:18px;text-align:center;margin-bottom:10px;}
.champ-flag{font-size:48px;} .champ-name{font-size:22px;font-weight:900;}
.champ-pct{font-size:36px;font-weight:900;color:var(--gold);}

/* === GROUPS === */
.grp-card{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.grp-head{background:var(--bg2);padding:8px 12px;font-weight:700;}
.grp-team{display:flex;align-items:center;gap:7px;padding:6px 12px;border-bottom:1px solid var(--border);}

/* === DUEL === */
.ld-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.ld-card{text-align:center;padding:12px;border:2px solid var(--border);border-radius:12px;}
.ld-name{font-size:11px;color:var(--muted);margin-bottom:4px;}
.ld-score{font-size:32px;font-weight:900;}
.ld-detail{font-size:10px;color:var(--muted);}

/* === CALENDAR === */
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:8px;margin-bottom:8px;}
.cal-nav{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:50%;cursor:pointer;font-size:20px;user-select:none;}
.cal-title{font-size:16px;font-weight:700;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;color:var(--muted);margin-bottom:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;}
.cal-day.has-match{border-color:rgba(47,168,245,.4);}
.cal-day.active{background:var(--accent);color:#000;border-color:var(--accent);}
.cal-day.active .cal-d-dot{background:#000;}
.cal-day.past{opacity:.5;}
.cal-d-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:2px;}
.cal-day-matches{margin-top:12px;}

/* === MATCH CARD === */
.mcard-dual{background:var(--card);border-radius:14px;padding:12px;margin-bottom:10px;}
.match-header{display:flex;align-items:center;gap:7px;padding:6px 0;margin-bottom:8px;border-bottom:1px solid var(--border);}
.match-group{font-size:9px;color:var(--muted);margin-left:auto;}
.match-time{font-size:9px;color:var(--muted);}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.model-box{padding:8px;border-radius:10px;}
.model-box-title{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.model-box.actual{background:rgba(47,168,245,.1);border:1px solid rgba(47,168,245,.3);}
.model-box.klement{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);}
.model-probs-mini{display:flex;gap:4px;margin:6px 0;}
.mprob-mini{flex:1;text-align:center;background:rgba(255,255,255,.05);border-radius:6px;padding:4px;}
.mpv{font-size:13px;font-weight:800;}
.mlabel{font-size:8px;color:var(--muted);}
.mscore{font-size:10px;color:var(--muted);margin-top:4px;}

/* === BET === */
.bet-market{background:rgba(0,0,0,.3);border-radius:12px;padding:10px;margin-top:10px;}
.bet-market-title{font-size:10px;font-weight:700;color:var(--yellow);margin-bottom:6px;text-transform:uppercase;}
.bet-odds{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.bet-option{background:var(--bg2);border-radius:8px;padding:6px 10px;text-align:center;min-width:68px;border:1px solid var(--border);}
.bet-option .blabel{font-size:8px;color:var(--muted);}
.bet-option .bval{font-size:12px;font-weight:800;color:var(--gold);}
.bet-option .breason{font-size:8px;color:var(--dim);font-style:italic;}

/* === RESULT === */
.result-real{background:rgba(32,192,90,.1);border-radius:8px;padding:10px;margin-top:10px;text-align:center;border:1px solid var(--green);}
.result-real .rscore{font-size:22px;font-weight:900;}
.result-real .rlabel{font-size:9px;color:var(--muted);margin-top:2px;}

/* === NO RESULT === */
.no-result{background:rgba(240,188,53,.05);border-radius:8px;padding:8px;margin-top:8px;text-align:center;border:1px solid rgba(240,188,53,.3);font-size:10px;color:var(--muted);}
</style>
</head>

// Calcula outcome real: 'H'=local gana, 'D'=empate, 'A'=visitante gana
function realOutcome(r){ return r.h>r.a?'H':r.h===r.a?'D':'A'; }
// Calcula outcome predicho por modelo: 'H', 'D' o 'A'
function predOutcome(p){ if(p.pH>p.pD&&p.pH>p.pA)return'H'; if(p.pA>p.pH&&p.pA>p.pD)return'A'; return'D'; }

function computeModelScores(){
  MODEL_SCORES={actual:{points:0,cw:0,total:0},klement:{points:0,cw:0,total:0}};
  for(let [key,real] of Object.entries(REAL_RESULTS)){
    if(!real.played) continue;
    const [h,a]=key.split('-');
    const ro=realOutcome(real);
    const pa=ensemblePredict(h,a), pk=klementPredict(h,a);
    const oa=predOutcome(pa), ok=predOutcome(pk);
    MODEL_SCORES.actual.total++;
    MODEL_SCORES.klement.total++;
    if(oa===ro){ MODEL_SCORES.actual.cw++; MODEL_SCORES.actual.points+=(ro==='D'?1:3); }

  }
}

}
function klementPredict(h,a){
  let sh=klementStrength(h,1),sa=klementStrength(a,0),diff=sh-sa;
  let pH=1/(1+Math.exp(-diff*2.5)),pA=1-pH;
  pH=pH*0.55+0.33*0.45; pA=pA*0.55+0.33*0.45;
  let pD=Math.max(0.02,1-pH-pA),tot=pH+pD+pA;
  pH/=tot; pD/=tot; pA/=tot;
  // Normalizar xG a rango realista (0.5–2.5) usando sigmoid sobre la fuerza relativa
  let base=1.2,xgH=Math.max(0.4,Math.min(2.5,base+(sh-sa)*0.4)),xgA=Math.max(0.4,Math.min(2.5,base+(sa-sh)*0.4));
  return {pH,pD,pA,xgH:xgH.toFixed(2),xgA:xgA.toFixed(2),score:Math.round(xgH)+'-'+Math.round(xgA)};
}
function eloPredict(h,a){
  let eh=G.elo[h]||1500,ea=G.elo[a]||1500;
  let expH=1/(1+Math.pow(10,(ea-eh)/400));
  return {pH:expH*0.74,pD:0.26,pA:(1-expH)*0.74};
}
function marketProb(h,a){
  let mh=MERCADO[h]||1500,ma=MERCADO[a]||1500,diff=(mh-ma)/400;
  let expH=1/(1+Math.pow(10,-diff));
  return {pH:expH*0.745,pD:0.255,pA:(1-expH)*0.745};
}
function ensemblePredict(h,a){
  let el=eloPredict(h,a),mk=marketProb(h,a);
  let pH=(el.pH+mk.pH)/2,pD=(el.pD+mk.pD)/2,pA=(el.pA+mk.pA)/2;
  let tot=pH+pD+pA;
  return {pH:pH/tot,pD:pD/tot,pA:pA/tot,score:pH>pA?'1-0':'0-1',xgH:'1.2',xgA:'1.0'};
}

// ==================== MONTE CARLO ASÍNCRONO ====================
async function runMC(N,modelo,cb){
  let champ={}; ALL_TEAMS.forEach(t=>champ[t]=0);
  for(let start=0;start<N;start+=500){
    let end=Math.min(start+500,N);
    for(let sim=start;sim<end;sim++){
      let adv=[],terceros=[];
      for(let [g,eqs] of Object.entries(GRUPOS)){
        let pts={}; eqs.forEach(e=>pts[e]=0);
        for(let i=0;i<eqs.length;i++) for(let j=i+1;j<eqs.length;j++){
          let r=Math.random(),w=null;
          let p=modelo==='klement'?klementPredict(eqs[i],eqs[j]):ensemblePredict(eqs[i],eqs[j]);
          if(r<p.pH)w=eqs[i]; else if(r<p.pH+p.pD)w=null; else w=eqs[j];
          if(w===eqs[i])pts[eqs[i]]+=3; else if(w===eqs[j])pts[eqs[j]]+=3; else{pts[eqs[i]]+=1;pts[eqs[j]]+=1;}
        }
        let ord=Object.entries(pts).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
        adv.push(ord[0],ord[1]); terceros.push({t:ord[2],pts:pts[ord[2]]||0});
      }
      terceros.sort((a,b)=>b.pts-a.pts);
      adv.push(...terceros.slice(0,8).map(x=>x.t));
      let bracket=adv.map(t=>({t,s:(G.elo[t]||1500)+(MERCADO[t]||1500)+(CHOKE[t]||0)+(DARK[t]||0)+Math.random()*250})).sort((a,b)=>b.s-a.s);
      while(bracket.length>1){
        let next=[];
        for(let i=0;i<bracket.length;i+=2){
          let t1=bracket[i].t,t2=bracket[i+1]?.t||bracket[i].t;
          let p=modelo==='klement'?klementPredict(t1,t2):ensemblePredict(t1,t2);
          let r2=Math.random(),w;
          if(r2<p.pH)w=t1; else if(r2<p.pH+p.pD){let pen=0.5+(G.elo[t1]||1500-(G.elo[t2]||1500))/2000;w=Math.random()<pen?t1:t2;} else w=t2;
          next.push({t:w,s:Math.random()});
        }
        bracket=next;
      }
      if(bracket[0])champ[bracket[0].t]=(champ[bracket[0].t]||0)+1;
    }
    let pct=Math.round(end/N*100);
    setProgress(modelo==='actual'?20+pct*0.3:60+pct*0.3,`${modelo==='actual'?'Modelo Actual':'Klement'}: ${end}/${N}`);
    await new Promise(r=>setTimeout(r,10));
  }
  let res={}; ALL_TEAMS.forEach(t=>res[t]=+((champ[t]||0)/N*100).toFixed(2));
  cb(res);
}

function buildBetHtml(pred,home,away){
  const pH=pred.pH,pD=pred.pD,pA=pred.pA;
  const xg=parseFloat(pred.xgH)+parseFloat(pred.xgA);
  let opts=[];
  if(pH>0.4) opts.push({l:'1X2',v:`${home} Gana`,q:(1/pH).toFixed(2),r:`${(pH*100).toFixed(0)}%`});
  if(pA>0.4) opts.push({l:'1X2',v:`${away} Gana`,q:(1/pA).toFixed(2),r:`${(pA*100).toFixed(0)}%`});
  if(pD>0.30) opts.push({l:'Empate',v:'X',q:(1/pD).toFixed(2),r:`${(pD*100).toFixed(0)}%`});
  opts.push({l:'Doble Oport.',v:pH>pA?`${home}/X`:`${away}/X`,q:pH>pA?(1/(pH+pD)).toFixed(2):(1/(pA+pD)).toFixed(2),r:'2 resultados'});
  opts.push({l:'Total Goles',v:xg>2.5?'+2.5':'-2.5',q:xg>2.5?'1.85':'2.10',r:`xG: ${xg.toFixed(1)}`});
  opts.push({l:'Marcador',v:pred.score,q:'6.50',r:'Más probable'});
  if(pH>0.35) opts.push({l:home,v:'+1.5 goles',q:'2.40',r:'Ataque activo'});
  if(pA>0.35) opts.push({l:away,v:'+1.5 goles',q:'2.40',r:'Ataque activo'});
  return `<div class="bet-market">
    <div class="bet-market-title">🎲 Recomendaciones BetPlay</div>
    <div class="bet-odds">${opts.map(o=>`<div class="bet-option"><div class="blabel">${o.l}</div><div class="bval">${o.v}</div><div class="blabel">~${o.q}</div><div class="breason">${o.r}</div></div>`).join('')}</div>
  </div>`;
}

  setProgress(60,'Monte Carlo — Klement (20k)…');
  await runMC(20000,'klement',res=>{K_MC=res;});
  setProgress(100,'¡Listo!');
  document.getElementById('statusDot').className='sdot ok';
  document.getElementById('modelScore').innerText='✓ OK';
  setTimeout(()=>{
    document.getElementById('overlay').classList.add('gone');
    renderChamp(); renderGroups(); renderDuel(); renderModel();
    // === Selección automática del día actual (o primer día con partido) ===
    renderCalendar();
    const hoy=todayStr;
    let autoDate=null;
    if(CALENDAR_MATCHES[hoy]?.length) autoDate=hoy;
    else {
      const todas=Object.keys(CALENDAR_MATCHES).sort();
      // buscar próxima fecha con partidos desde hoy
      autoDate=todas.find(d=>d>=hoy) || todas[0];
    }
    if(autoDate){
      // Asegurarse de que el mes del calendario coincide
      const mo=parseInt(autoDate.split('-')[1])-1;
      if(mo!==calMonth){ calMonth=mo; }
      selectCalDay(autoDate);
    }
  },500);
}

boot();
</script>
