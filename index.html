<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FootIQ · Mundial 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0f1c">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, sans-serif; background: #0a0f1c; color: #c8d6e5; min-height: 100vh; padding-bottom: 80px; }
        .header { background: linear-gradient(180deg, #1a2740, #0a0f1c); padding: 20px 16px 12px; text-align: center; border-bottom: 1px solid #2a3a5c; position: sticky; top: 0; z-index: 10; }
        .header h1 { font-size: 1.6em; color: #4fc3f7; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; }
        .nav button { background: none; border: 1px solid #2a3a5c; color: #78909c; padding: 8px 16px; border-radius: 8px; font-size: 1em; }
        .nav .month-label { color: #4fc3f7; font-weight: 600; font-size: 1.1em; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #607d8b; font-size: 0.75em; padding: 8px 16px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 16px 16px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.9em; color: #78909c; }
        .day-cell.match { background: #1a2740; color: #c8d6e5; font-weight: 600; border: 1px solid #2a3a5c; }
        .day-cell.today { border: 2px solid #ffca28; }
        .day-cell:empty { visibility: hidden; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: #0a0f1c; margin: 60px 16px 20px; border-radius: 20px; padding: 20px; border: 1px solid #2a3a5c; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .close { background: none; border: none; color: #ff5252; font-size: 1.5em; cursor: pointer; }
        .card { background: #1a2740; border-radius: 14px; padding: 14px; margin-bottom: 12px; border: 1px solid #2a3a5c; cursor: pointer; transition: all 0.2s; }
        .card:hover { border-color: #4fc3f7; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .fase { background: #2a3a5c; color: #4fc3f7; padding: 3px 10px; border-radius: 6px; font-size: 0.7em; font-weight: 600; }
        .teams { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .team { font-weight: 700; font-size: 1em; }
        .vs { color: #607d8b; font-size: 0.8em; }
        .bar { height: 6px; background: #0d1829; border-radius: 3px; display: flex; overflow: hidden; margin: 8px 0; }
        .detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; }
        .detail-modal.active { display: block; }
        .detail-content { background: #0a0f1c; margin: 40px 12px; border-radius: 20px; padding: 20px; border: 1px solid #2a3a5c; }
        .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a2740; }
        .ev-positive { color: #4caf50; }
        .ev-negative { color: #ff5252; }
    </style>
</head>
<body>
    <div class="header"><h1>🌍 FootIQ · Mundial 2026</h1></div>
    <div class="nav">
        <button onclick="changeMonth(-1)">◀</button>
        <span class="month-label" id="monthLabel"></span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="weekdays"><span>D</span><span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span></div>
    <div class="days-grid" id="daysGrid"></div>

    <div class="modal" id="dayModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalMatches"></div>
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script>
        let currentMonth = 5; // Junio 2026 (0-index: 5)
        let currentYear = 2026;
        let allData = {};

        fetch('data.json').then(r => r.json()).then(d => {
            allData = d;
            renderCalendar();
        });

        function renderCalendar() {
            const grid = document.getElementById('daysGrid');
            const label = document.getElementById('monthLabel');
            const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto'];
            label.textContent = months[currentMonth] + ' ' + currentYear;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
            const today = new Date().toISOString().split('T')[0];

            grid.innerHTML = '';
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="day-cell"></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasMatch = allData[dateStr] && allData[dateStr].length > 0;
                const isToday = dateStr === today;
                const div = document.createElement('div');
                div.className = 'day-cell';
                if (hasMatch) div.classList.add('match');
                if (isToday) div.classList.add('today');
                div.textContent = d;
                if (hasMatch) {
                    div.onclick = () => openDayModal(dateStr);
                }
                grid.appendChild(div);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 5) { currentMonth = 5; }
            if (currentMonth > 7) { currentMonth = 7; }
            renderCalendar();
        }

        function openDayModal(dateStr) {
            const matches = allData[dateStr] || [];
            document.getElementById('modalTitle').textContent = dateStr;
            const container = document.getElementById('modalMatches');
            container.innerHTML = matches.map((m, idx) => `
                <div class="card" onclick="openDetail('${dateStr}', ${idx})">
                    <div class="card-header">
                        <span class="fase">${m.fase || 'Grupos'} ${m.grupo ? '· ' + m.grupo : ''}</span>
                        <span style="font-size:0.75em;color:#607d8b;">${m.hora}</span>
                    </div>
                    <div class="teams">
                        <span class="team">${m.local}</span>
                        <span class="vs">vs</span>
                        <span class="team">${m.visitante}</span>
                    </div>
                    ${m.es_tbd ? '<p style="color:#ffca28;text-align:center;margin-top:8px;">⚡ Por definir</p>' : `
                        <div class="bar">
                            <div style="width:${m.prob_h}%;background:#4fc3f7;height:6px;border-radius:3px 0 0 3px;"></div>
                            <div style="width:${m.prob_d}%;background:#78909c;height:6px;"></div>
                            <div style="width:${m.prob_a}%;background:#ff7043;height:6px;border-radius:0 3px 3px 0;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:0.7em;color:#78909c;">
                            <span>${m.prob_h}%</span><span>${m.prob_d}%</span><span>${m.prob_a}%</span>
                        </div>
                        <p style="text-align:center;margin-top:6px;color:#ffca28;">🎯 ${m.marcador}</p>
                    `}
                </div>
            `).join('');
            document.getElementById('dayModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        function openDetail(dateStr, idx) {
            const m = allData[dateStr][idx];
            if (m.es_tbd) return;
            const evH = m.ev_h || 0;
            const evA = m.ev_a || 0;
            const recomendacion = evH > 0.02 ? m.local : (evA > 0.02 ? m.visitante : null);
            document.getElementById('detailContent').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h2>${m.local} vs ${m.visitante}</h2>
                    <button style="background:none;border:none;color:#ff5252;font-size:1.5em;" onclick="document.getElementById('detailModal').classList.remove('active')">✕</button>
                </div>
                <div class="stat-row"><span>🏆 Fase</span><span>${m.fase || 'Grupos'} · ${m.grupo}</span></div>
                <div class="stat-row"><span>🕐 Hora (COL)</span><span>${m.hora}</span></div>
                <div class="stat-row"><span>📊 ${m.local}</span><span style="color:#4fc3f7;">${m.prob_h}%</span></div>
                <div class="stat-row"><span>📊 Empate</span><span>${m.prob_d}%</span></div>
                <div class="stat-row"><span>📊 ${m.visitante}</span><span style="color:#ff7043;">${m.prob_a}%</span></div>
                <div class="stat-row"><span>🎯 Marcador probable</span><span style="color:#ffca28;">${m.marcador}</span></div>
                <div class="stat-row"><span>📈 Over 2.5</span><span class="${m.over25 ? 'ev-positive' : 'ev-negative'}">${m.over25 ? 'SÍ' : 'NO'}</span></div>
                <div class="stat-row"><span>⚽ Ambos marcan</span><span class="${m.ambos ? 'ev-positive' : 'ev-negative'}">${m.ambos ? 'SÍ' : 'NO'}</span></div>
                <div class="stat-row"><span>💹 Cuota ${m.local}</span><span>${m.cuota_h}</span></div>
                <div class="stat-row"><span>💹 Cuota Empate</span><span>${m.cuota_d}</span></div>
                <div class="stat-row"><span>💹 Cuota ${m.visitante}</span><span>${m.cuota_a}</span></div>
                <div class="stat-row"><span>💰 EV ${m.local}</span><span class="${evH > 0 ? 'ev-positive' : 'ev-negative'}">${(evH*100).toFixed(1)}%</span></div>
                <div class="stat-row"><span>💰 EV ${m.visitante}</span><span class="${evA > 0 ? 'ev-positive' : 'ev-negative'}">${(evA*100).toFixed(1)}%</span></div>
                ${recomendacion ? `<div style="text-align:center;margin-top:16px;background:#1a2740;padding:12px;border-radius:10px;color:#4caf50;">✅ Apuesta con valor: <strong>${recomendacion}</strong></div>` : '<div style="text-align:center;margin-top:16px;color:#78909c;">⚠️ Sin apuesta clara con valor.</div>'}
                <p style="text-align:center;color:#ff5252;font-size:0.8em;margin-top:12px;">❌ Evitar: marcador exacto</p>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
    </script>
</body>
</html>
