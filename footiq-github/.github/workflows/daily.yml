name: Update Predictions
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install pandas numpy scikit-learn requests
      - run: python predict.py
      - name: Commit updates
        run: |
          git config user.name "FootIQ Bot"
          git config user.email "bot@footiq.com"
          git add data.json index.html
          git commit -m "Daily prediction update" || echo "No changes"
          git push
